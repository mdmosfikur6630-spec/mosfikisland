name: Build Island APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout island repo
        uses: actions/checkout@v3
        with:
          path: island

      - name: Checkout deagle dependency (sibling of island)
        uses: actions/checkout@v3
        with:
          repository: oasisfeng/deagle
          path: deagle

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Fix deagle build.gradle (runtimeOnly -> implementation)
        run: |
          sed -i 's/runtimeOnly/implementation/g' deagle/library/build.gradle

      - name: Setup Gradle cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Build complete debug APK
        working-directory: island
        run: |
          ./gradlew assembleCompleteDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: island-complete-debug-apk
          path: island/assembly/build/outputs/apk/complete/debug/*.apk
