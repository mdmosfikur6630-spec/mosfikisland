name: Build Island APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Gradle cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Build complete debug APK
        run: ./gradlew assembleCompleteDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: island-complete-debug-apk
          path: assembly/build/outputs/apk/complete/debug/*.apk
